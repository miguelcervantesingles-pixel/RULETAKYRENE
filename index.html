<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta de Preguntas - Morena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #061a0d 0%, #0f3d1e 40%, #061a0d 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
}

/* ─── SIGNOS DE PREGUNTA VOLADORES ─── */
.qmark-bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
}

.qmark {
    position: absolute;
    font-weight: 900;
    opacity: 0.18;
    animation: floatQ linear infinite;
    user-select: none;
    filter: drop-shadow(0 0 4px rgba(255,255,255,0.05));
}

@keyframes floatQ {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.08; }
    25%  { transform: translateY(-30vh) rotate(90deg) scale(1.2); opacity: 0.22; }
    50%  { transform: translateY(-60vh) rotate(180deg) scale(0.9); opacity: 0.14; }
    75%  { transform: translateY(-85vh) rotate(270deg) scale(1.1); opacity: 0.25; }
    100% { transform: translateY(-110vh) rotate(360deg) scale(1); opacity: 0.06; }
}

.game-container {
    max-width: 840px;
    width: 100%;
    background: linear-gradient(180deg, #fcf8f0 0%, #f2eadc 100%);
    border-radius: 24px;
    padding: 30px 25px 25px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 4px #ce1126, 0 0 0 8px #006341;
    position: relative;
    z-index: 1;
}

h1#mainTitle {
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 2px;
    min-height: 38px;
}
h1#mainTitle span { display: inline-block; }

.color-bar {
    display: flex;
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
    margin: 6px auto 10px;
    max-width: 80%;
}
.color-bar span { flex: 1; }

.subtitle {
    text-align: center;
    color: #8a7a5a;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 20px;
}

.question-counter {
    text-align: center;
    font-size: 14px;
    color: #6a5a3a;
    font-weight: 600;
    margin-bottom: 14px;
}
.question-counter span {
    display: inline-block;
    background: linear-gradient(135deg, #1a5c2e, #0f421e);
    color: #fff;
    padding: 3px 16px;
    border-radius: 12px;
    font-size: 13px;
    box-shadow: 0 2px 6px rgba(26,92,46,0.3);
}

/* ─── TUBO CILÍNDRICO 3D ─── */
.tube-wrapper {
    perspective: 900px;
    margin-bottom: 8px;
}

.tube-container {
    position: relative;
    background: #1e1e30;
    border-radius: 30px / 55px;
    padding: 5px;
    box-shadow:
        inset 0 -8px 20px rgba(0,0,0,0.7),
        inset 0 8px 20px rgba(255,255,255,0.02),
        0 12px 40px rgba(0,0,0,0.5);
    transform: rotateX(1deg);
}

.tube-container::before {
    content: '';
    position: absolute;
    top: 5px; left: 5px; right: 5px; bottom: 5px;
    border-radius: 25px / 50px;
    background: linear-gradient(90deg,
        rgba(0,0,0,0.35) 0%,
        rgba(0,0,0,0.10) 8%,
        rgba(255,255,255,0.04) 20%,
        rgba(255,255,255,0.08) 45%,
        rgba(255,255,255,0.10) 50%,
        rgba(255,255,255,0.08) 55%,
        rgba(255,255,255,0.04) 80%,
        rgba(0,0,0,0.10) 92%,
        rgba(0,0,0,0.35) 100%
    );
    pointer-events: none;
    z-index: 4;
}

.tube-track {
    display: flex;
    border-radius: 25px / 50px;
    overflow: hidden;
    height: 120px;
    position: relative;
    background: linear-gradient(180deg, #22223a 0%, #2a2a48 40%, #22223a 100%);
}

.tube-track::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 25px / 50px;
    background: linear-gradient(180deg,
        rgba(255,255,255,0.06) 0%,
        transparent 30%,
        transparent 70%,
        rgba(0,0,0,0.15) 100%
    );
    pointer-events: none;
    z-index: 3;
}

.tube-cell {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px 6px;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    text-align: center;
    position: relative;
    z-index: 2;
    user-select: none;
    border-right: 1px solid rgba(255,255,255,0.06);
    background: transparent;
}

.tube-cell:last-child { border-right: none; }

.tube-cell .cell-label {
    position: absolute;
    top: 6px;
    left: 10px;
    font-size: 8px;
    font-weight: 700;
    color: rgba(255,255,255,0.18);
    text-transform: uppercase;
    letter-spacing: 1px;
    z-index: 5;
}

.tube-cell .cell-content {
    position: relative;
    z-index: 2;
    line-height: 1.3;
    max-height: 90px;
    overflow: hidden;
}

.tube-cell .cell-content.final {
    color: #ffffff;
    font-weight: 800;
    text-shadow: 0 0 6px rgba(255,255,255,0.15);
}

/* ─── GIRO CILÍNDRICO ─── */
.cell-content.spin-forward {
    animation: spinForward 0.15s ease-in-out infinite;
}
.cell-content.spin-backward {
    animation: spinBackward 0.15s ease-in-out infinite;
}

@keyframes spinForward {
    0%   { transform: translateY(-22px); opacity: 0.1; filter: blur(1px); }
    25%  { transform: translateY(-8px);  opacity: 0.8; filter: blur(0); }
    50%  { transform: translateY(0);     opacity: 1;   filter: blur(0); }
    75%  { transform: translateY(8px);   opacity: 0.8; filter: blur(0); }
    100% { transform: translateY(22px);  opacity: 0.1; filter: blur(1px); }
}

@keyframes spinBackward {
    0%   { transform: translateY(22px);  opacity: 0.1; filter: blur(1px); }
    25%  { transform: translateY(8px);   opacity: 0.8; filter: blur(0); }
    50%  { transform: translateY(0);     opacity: 1;   filter: blur(0); }
    75%  { transform: translateY(-8px);  opacity: 0.8; filter: blur(0); }
    100% { transform: translateY(-22px); opacity: 0.1; filter: blur(1px); }
}

.tube-cell.glow-spin {
    animation: cellGlow 0.15s infinite alternate;
}

@keyframes cellGlow {
    0% { filter: brightness(1); }
    100% { filter: brightness(1.5); }
}

.tube-glow {
    position: absolute;
    top: -3px; left: -3px; right: -3px; bottom: -3px;
    border-radius: 33px / 58px;
    pointer-events: none;
    border: 2px solid transparent;
    transition: all 0.4s;
    z-index: 5;
}
.tube-glow.active {
    border-color: #ffd700;
    box-shadow: 0 0 30px rgba(255,215,0,0.3), 0 0 60px rgba(255,215,0,0.1);
}

/* ─── BOTÓN GIRAR ─── */
.btn-spin-wrapper {
    display: flex;
    justify-content: center;
    margin: 10px 0 16px;
}

.btn-spin {
    background: linear-gradient(135deg, #ce1126, #a00e1e);
    color: #fff;
    border: none;
    padding: 12px 48px;
    font-size: 20px;
    font-weight: 800;
    border-radius: 40px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 0 6px 20px rgba(206,17,38,0.4);
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
}
.btn-spin:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(206,17,38,0.5);
}
.btn-spin:active:not(:disabled) { transform: translateY(0); }
.btn-spin:disabled { opacity: 0.5; cursor: not-allowed; }

/* ─── PREGUNTA ─── */
.pregunta-box {
    background: linear-gradient(135deg, #fff, #fcf8f0);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 10px;
    min-height: 52px;
    border: 2px solid #e0d5c5;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.04);
    transition: all 0.3s;
}
.pregunta-box.active {
    border-color: #1a5c2e;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.04), 0 0 20px rgba(26,92,46,0.12);
}

.pregunta-label {
    font-size: 11px;
    font-weight: 700;
    color: #8a7a5a;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
}
.pregunta-texto {
    font-size: 20px;
    font-weight: 700;
    color: #2d2d2d;
    line-height: 1.4;
    min-height: 28px;
}
.pregunta-texto.placeholder {
    color: #b0a898;
    font-weight: 400;
    font-size: 16px;
}

/* ─── RESPUESTA ─── */
.respuesta-area {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
}

.btn-respuesta {
    background: linear-gradient(135deg, #1a5c2e, #0f421e);
    color: #fff;
    border: none;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 700;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(26,92,46,0.3);
}
.btn-respuesta:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(26,92,46,0.4);
}
.btn-respuesta:disabled { opacity: 0.4; cursor: not-allowed; }

.respuesta-texto {
    flex: 1;
    background: #fff8e8;
    border-radius: 12px;
    padding: 10px 18px;
    font-size: 17px;
    font-weight: 600;
    color: #1a5c2e;
    min-height: 42px;
    border: 2px dashed #c0b098;
    transition: all 0.3s;
}
.respuesta-texto.revealed {
    border-color: #ffd700;
    background: #fff8dc;
    border-style: solid;
    box-shadow: 0 0 16px rgba(255,215,0,0.15);
}

/* ─── FILAS ─── */
.filas-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin: 14px 0 12px;
}

.fila-card {
    background: #fff;
    border-radius: 14px;
    padding: 12px 10px 14px;
    text-align: center;
    border: 2px solid #e0d5c5;
    transition: all 0.2s;
    cursor: default;
}
.fila-card:not(.disabled) { cursor: pointer; }
.fila-card:not(.disabled):hover {
    border-color: #ffd700;
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}
.fila-card.disabled { opacity: 0.5; }

.fila-numero {
    font-size: 13px;
    font-weight: 700;
    color: #8a7a5a;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 2px;
}

.fila-puntos {
    font-size: 26px;
    font-weight: 800;
    color: #2d2d2d;
}
.fila-puntos span { color: #ffd700; }

.fila-btn {
    background: linear-gradient(135deg, #1a5c2e, #0f421e);
    color: #fff;
    border: none;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 700;
    border-radius: 20px;
    cursor: pointer;
    margin-top: 6px;
    width: 100%;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.fila-btn:hover:not(:disabled) { background: #0f421e; transform: scale(1.03); }
.fila-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ─── REVELAR GANADOR ─── */
.btn-winner-wrapper {
    display: flex;
    justify-content: center;
    margin-top: 14px;
}

.btn-winner {
    background: linear-gradient(135deg, #ffd700, #f0c000);
    color: #2d2d2d;
    border: none;
    padding: 14px 40px;
    font-size: 20px;
    font-weight: 800;
    border-radius: 40px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 6px 24px rgba(255,215,0,0.4);
    transition: all 0.3s;
    display: none;
}
.btn-winner:hover:not(:disabled) {
    transform: scale(1.04);
    box-shadow: 0 10px 32px rgba(255,215,0,0.5);
}
.btn-winner:disabled { opacity: 0.6; cursor: default; transform: none; }

/* ─── MODAL ─── */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }

.modal-box {
    background: linear-gradient(180deg, #faf6ef, #f0e8d8);
    border-radius: 28px;
    padding: 40px 50px;
    text-align: center;
    max-width: 460px;
    width: 90%;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    border: 4px solid #ffd700;
    animation: modalPop 0.4s ease-out;
}

@keyframes modalPop {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.04); }
    100% { transform: scale(1); opacity: 1; }
}

.modal-icon { font-size: 60px; margin-bottom: 6px; }
.modal-title {
    font-size: 14px;
    color: #8a7a5a;
    text-transform: uppercase;
    letter-spacing: 4px;
    font-weight: 600;
}
.modal-fila { font-size: 72px; font-weight: 900; color: #1a5c2e; margin: 4px 0; }
.modal-puntos { font-size: 28px; font-weight: 700; color: #ce1126; margin-bottom: 8px; }

.modal-close {
    background: #1a5c2e;
    color: #fff;
    border: none;
    padding: 12px 36px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 30px;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.2s;
}
.modal-close:hover { background: #0f421e; transform: scale(1.03); }

/* ─── CONFETTI ─── */
.confetti-container {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 1001;
    overflow: hidden;
}

.confetti-piece {
    position: absolute;
    width: 10px;
    height: 18px;
    top: -20px;
    animation: confettiFall linear forwards;
}

@keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ─── RESPONSIVE ─── */
@media (max-width: 600px) {
    .game-container { padding: 18px 14px; }
    h1#mainTitle { font-size: 20px; }
    .tube-track { height: 72px; }
    .tube-cell { font-size: 12px; padding: 8px 4px; }
    .btn-spin { font-size: 16px; padding: 10px 30px; }
    .pregunta-texto { font-size: 16px; }
    .filas-grid { grid-template-columns: repeat(2, 1fr); }
    .respuesta-area { flex-direction: column; }
    .btn-respuesta { width: 100%; white-space: normal; }
    .modal-fila { font-size: 48px; }
    .modal-box { padding: 30px 24px; }
}
</style>
</head>
<body>

<div class="qmark-bg" id="qmarkBg"></div>

<div class="game-container">
    <h1 id="mainTitle">🇲🇽 RULETA DE PREGUNTAS</h1>
    <div class="color-bar" id="colorBar"></div>
    <div class="subtitle">Morena · Historia de M&eacute;xico</div>

    <div class="question-counter">
        Pregunta <span id="contador">0 / 7</span>
    </div>

    <!-- TUBO CILÍNDRICO -->
    <div class="tube-wrapper">
        <div class="tube-container">
            <div class="tube-track" id="tubeTrack">
                <div class="tube-cell" id="col1">
                    <span class="cell-label">&diams; 1</span>
                    <span class="cell-content" id="col1text">?</span>
                </div>
                <div class="tube-cell" id="col2">
                    <span class="cell-label">&diams; 2</span>
                    <span class="cell-content" id="col2text">?</span>
                </div>
                <div class="tube-cell" id="col3">
                    <span class="cell-label">&diams; 3</span>
                    <span class="cell-content" id="col3text">?</span>
                </div>
            </div>
            <div class="tube-glow" id="tubeGlow"></div>
        </div>
    </div>

    <div class="btn-spin-wrapper">
        <button class="btn-spin" id="btnGirar" onclick="girar()">&#x1f3b2; Girar</button>
    </div>

    <div class="pregunta-box" id="preguntaBox">
        <div class="pregunta-label">&#x1f4cc; Pregunta</div>
        <div class="pregunta-texto placeholder" id="preguntaTexto">Presiona &quot;Girar&quot; para comenzar</div>
    </div>

    <div class="respuesta-area">
        <button class="btn-respuesta" id="btnRespuesta" onclick="mostrarRespuesta()" disabled>&#x1f4d6; Mostrar Respuesta</button>
        <div class="respuesta-texto" id="respuestaTexto">&mdash;</div>
    </div>

    <div class="filas-grid" id="filasGrid">
        <div class="fila-card" id="fila1">
            <div class="fila-numero">&#x1f4cb; Fila 1</div>
            <div class="fila-puntos"><span id="pts1">0</span> pts</div>
            <button class="fila-btn" id="btnFila1" onclick="agregarPuntos(1)" disabled>+10 acierto</button>
        </div>
        <div class="fila-card" id="fila2">
            <div class="fila-numero">&#x1f4cb; Fila 2</div>
            <div class="fila-puntos"><span id="pts2">0</span> pts</div>
            <button class="fila-btn" id="btnFila2" onclick="agregarPuntos(2)" disabled>+10 acierto</button>
        </div>
        <div class="fila-card" id="fila3">
            <div class="fila-numero">&#x1f4cb; Fila 3</div>
            <div class="fila-puntos"><span id="pts3">0</span> pts</div>
            <button class="fila-btn" id="btnFila3" onclick="agregarPuntos(3)" disabled>+10 acierto</button>
        </div>
        <div class="fila-card" id="fila4">
            <div class="fila-numero">&#x1f4cb; Fila 4</div>
            <div class="fila-puntos"><span id="pts4">0</span> pts</div>
            <button class="fila-btn" id="btnFila4" onclick="agregarPuntos(4)" disabled>+10 acierto</button>
        </div>
    </div>

    <div class="btn-winner-wrapper">
        <button class="btn-winner" id="btnWinner" onclick="revelarGanador()">&#x1f3c6; Revelar Ganador</button>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <div class="modal-icon">&#x1f3c6;</div>
        <div class="modal-title">Fila Ganadora</div>
        <div class="modal-fila" id="modalFila">Fila 1</div>
        <div class="modal-puntos" id="modalPuntos">0 pts</div>
        <button class="modal-close" onclick="cerrarModal()">&#x1f389; Cerrar</button>
    </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
var COLORES = [
    '#FF1493','#00BFFF','#FFD700','#32CD32','#FF4500',
    '#9370DB','#FF6347','#00FA9A','#FF69B4','#1E90FF',
    '#FF0000','#00FF7F','#FF8C00','#BA55D3','#48D1CC',
    '#FF6B6B','#4ECDC4','#FFE66D','#A8E6CF','#DDA0DD',
    '#7B68EE','#FF7F50','#00CED1','#FFDAB9'
];

function colorearLetras(texto) {
    return texto.split('').map(function(ch) {
        if (ch === ' ' || ch === '') return ' ';
        var c = COLORES[Math.floor(Math.random() * COLORES.length)];
        return '<span style="color:' + c + ';font-weight:800">' + ch + '</span>';
    }).join('');
}

var preguntas = [
    { parte1:"¿Quién es el",   parte2:"fundador de",  parte3:"Morena?",          pregunta:"¿Quién es el fundador de Morena?",                                   respuesta:"Andrés Manuel López Obrador" },
    { parte1:"¿En qué año",    parte2:"nació",        parte3:"Morena?",          pregunta:"¿En qué año nació Morena?",                                         respuesta:"2014" },
    { parte1:"¿Quién",         parte2:"apoyó a",      parte3:"Morena?",          pregunta:"¿Quién apoyó a Morena?",                                           respuesta:"Jóvenes, adultos mayores y personas que quieran un cambio político" },
    { parte1:"¿Quién es la",   parte2:"presidenta actual", parte3:"de México?",  pregunta:"¿Quién es la presidenta actual de México?",                        respuesta:"Claudia Sheinbaum" },
    { parte1:"¿Con qué partido", parte2:"formó alianza", parte3:"Morena?",       pregunta:"¿Con qué partido formó alianza Morena?",                            respuesta:"Partido del Trabajo (PT), Partido Encuentro Social (PES), Partido Verde (PVEM)" },
    { parte1:"¿Cuáles son las", parte2:"3 transformaciones", parte3:"históricas de México?", pregunta:"¿Cuáles son las 3 transformaciones históricas de México?", respuesta:"Independencia de México, La Reforma, Revolución Mexicana" },
    { parte1:"¿Cuáles son los", parte2:"objetivos principales", parte3:"de Morena?", pregunta:"¿Cuáles son los objetivos principales de Morena?",              respuesta:"Política social, combate a la corrupción, cambio de régimen" }
];

var preguntasUsadas = [];
var preguntaActual = -1;
var puntos = [0,0,0,0];
var preguntasRespondidas = 0;
var spinning = false;
var respuestaRevelada = false;
var preguntaActiva = false;

var col1text = document.getElementById('col1text');
var col2text = document.getElementById('col2text');
var col3text = document.getElementById('col3text');
var col1 = document.getElementById('col1');
var col2 = document.getElementById('col2');
var col3 = document.getElementById('col3');
var tubeGlow = document.getElementById('tubeGlow');
var preguntaTexto = document.getElementById('preguntaTexto');
var preguntaBox = document.getElementById('preguntaBox');
var respuestaTexto = document.getElementById('respuestaTexto');
var btnRespuesta = document.getElementById('btnRespuesta');
var btnGirar = document.getElementById('btnGirar');
var btnWinner = document.getElementById('btnWinner');
var contador = document.getElementById('contador');
var filaBtns = [
    document.getElementById('btnFila1'),
    document.getElementById('btnFila2'),
    document.getElementById('btnFila3'),
    document.getElementById('btnFila4')
];

function actualizarContador() {
    contador.textContent = preguntasRespondidas + ' / ' + preguntas.length;
}

function habilitarFilas(valor) {
    for (var i = 0; i < 4; i++) filaBtns[i].disabled = !valor;
}

function girar() {
    if (spinning) return;
    if (preguntasUsadas.length >= preguntas.length) {
        btnGirar.disabled = true;
        return;
    }

    respuestaRevelada = false;
    preguntaActiva = false;
    respuestaTexto.textContent = '\u2014';
    respuestaTexto.classList.remove('revealed');
    btnRespuesta.disabled = true;
    habilitarFilas(false);

    var idx;
    var intentos = 0;
    do {
        idx = Math.floor(Math.random() * preguntas.length);
        intentos++;
    } while (preguntasUsadas.indexOf(idx) !== -1 && intentos < 100);

    if (intentos >= 100) {
        spinning = false;
        btnGirar.disabled = false;
        return;
    }

    preguntasUsadas.push(idx);
    preguntaActual = idx;
    preguntaActiva = true;

    var q = preguntas[idx];

    spinning = true;
    btnGirar.disabled = true;
    tubeGlow.classList.add('active');
    preguntaTexto.textContent = '\uD83C\uDFB0 Girando...';
    preguntaTexto.className = 'pregunta-texto';

    col1text.classList.remove('final');
    col2text.classList.remove('final');
    col3text.classList.remove('final');

    col1text.classList.add('spin-forward');
    col2text.classList.add('spin-backward');
    col3text.classList.add('spin-forward');
    col1.classList.add('glow-spin');
    col2.classList.add('glow-spin');
    col3.classList.add('glow-spin');

    var int1 = setInterval(function() {
        var r = preguntas[Math.floor(Math.random() * preguntas.length)];
        col1text.textContent = r.parte1;
    }, 70);
    var int2 = setInterval(function() {
        var r = preguntas[Math.floor(Math.random() * preguntas.length)];
        col2text.textContent = r.parte2;
    }, 70);
    var int3 = setInterval(function() {
        var r = preguntas[Math.floor(Math.random() * preguntas.length)];
        col3text.textContent = r.parte3;
    }, 70);

    setTimeout(function() {
        clearInterval(int1);
        col1text.textContent = q.parte1;
        col1text.classList.remove('spin-forward');
        col1.classList.remove('glow-spin');
    }, 900);

    setTimeout(function() {
        clearInterval(int2);
        col2text.textContent = q.parte2;
        col2text.classList.remove('spin-backward');
        col2.classList.remove('glow-spin');
    }, 1500);

    setTimeout(function() {
        clearInterval(int3);
        col3text.textContent = q.parte3;
        col3text.classList.remove('spin-forward');
        col3.classList.remove('glow-spin');
        col1text.classList.add('final');
        col2text.classList.add('final');
        col3text.classList.add('final');

        preguntaTexto.textContent = q.pregunta;
        preguntaBox.classList.add('active');
        btnRespuesta.disabled = false;
        tubeGlow.classList.remove('active');

        spinning = false;
        btnGirar.disabled = false;
        habilitarFilas(false);
    }, 2100);
}

function mostrarRespuesta() {
    if (preguntaActual < 0) return;
    if (respuestaRevelada) return;

    respuestaRevelada = true;
    btnRespuesta.disabled = true;
    preguntaTexto.textContent = preguntas[preguntaActual].pregunta;

    respuestaTexto.textContent = '\u2705 ' + preguntas[preguntaActual].respuesta;
    respuestaTexto.classList.add('revealed');
    preguntaBox.classList.remove('active');

    preguntasRespondidas++;
    actualizarContador();

    if (preguntasRespondidas >= preguntas.length) {
        btnGirar.disabled = true;
        btnWinner.style.display = 'inline-block';
    }
    habilitarFilas(true);
}

function agregarPuntos(fila) {
    if (!respuestaRevelada) return;
    if (preguntaActual < 0) return;

    puntos[fila - 1] += 10;
    document.getElementById('pts' + fila).textContent = puntos[fila - 1];

    var card = document.getElementById('fila' + fila);
    card.style.borderColor = '#ffd700';
    card.style.background = '#fffce8';
    card.style.transform = 'scale(1.05)';
    setTimeout(function() {
        card.style.borderColor = '#e0d5c5';
        card.style.background = '#fff';
        card.style.transform = 'scale(1)';
    }, 500);

    habilitarFilas(false);
}

function revelarGanador() {
    if (preguntasRespondidas < preguntas.length) return;

    var maxPts = Math.max.apply(null, puntos);
    var ganadoras = [];
    for (var i = 0; i < 4; i++) {
        if (puntos[i] === maxPts) ganadoras.push(i + 1);
    }
    var ganadora = ganadoras[Math.floor(Math.random() * ganadoras.length)];

    document.getElementById('modalFila').textContent = '\uD83C\uDFAF Fila ' + ganadora;
    document.getElementById('modalPuntos').textContent = puntos[ganadora - 1] + ' puntos';
    document.getElementById('modalOverlay').classList.add('show');

    lanzarConfetti();
    btnWinner.textContent = '\uD83C\uDFC6 \u00a1Ganador Revelado!';
    btnWinner.disabled = true;
}

function cerrarModal() {
    document.getElementById('modalOverlay').classList.remove('show');
}

function lanzarConfetti() {
    var container = document.getElementById('confettiContainer');
    var colors = ['#ce1126','#006341','#ffd700','#ffffff','#FF1493','#00BFFF','#32CD32','#FF4500'];
    for (var i = 0; i < 100; i++) {
        var piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = (Math.random() * 8 + 6) + 'px';
        piece.style.height = (Math.random() * 12 + 10) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
        piece.style.animationDelay = (Math.random() * 2) + 's';
        container.appendChild(piece);
    }
    setTimeout(function() { container.innerHTML = ''; }, 5000);
}

// Inicialización
(function init() {
    actualizarContador();

    // Título colorido
    var h1 = document.getElementById('mainTitle');
    h1.innerHTML = colorearLetras(h1.textContent);

    // Barra de colores
    var bar = document.getElementById('colorBar');
    var coloresBar = ['#FF1493','#FFD700','#32CD32','#00BFFF','#FF4500','#9370DB','#FF6347','#00FA9A','#FF69B4','#1E90FF'];
    bar.innerHTML = coloresBar.map(function(c) { return '<span style="background:' + c + '"></span>'; }).join('');

    // Signos de pregunta voladores GIGANTES
    var bg = document.getElementById('qmarkBg');
    var simbolos = ['\u2753', '\u2754', '?', '\u2047'];
    var coloresQ = ['#FF6B6B','#4ECDC4','#FFE66D','#FF69B4','#00BFFF','#9370DB','#ffd700','#32CD32'];
    for (var i = 0; i < 25; i++) {
        var el = document.createElement('div');
        el.className = 'qmark';
        el.textContent = simbolos[Math.floor(Math.random() * simbolos.length)];
        el.style.left = Math.random() * 100 + '%';
        el.style.bottom = '-5%';
        el.style.fontSize = (Math.random() * 140 + 70) + 'px';
        el.style.color = coloresQ[Math.floor(Math.random() * coloresQ.length)];
        el.style.animationDuration = (Math.random() * 20 + 16) + 's';
        el.style.animationDelay = (Math.random() * 10) + 's';
        bg.appendChild(el);
    }
})();
</script>
</body>
</html>
